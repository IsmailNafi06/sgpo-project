spring.application.name=sgpo

server.port=${SERVER_PORT:8081}

# === PostgreSQL unifie (graphe metier + vecteurs RAG) ===
spring.datasource.url=jdbc:postgresql://localhost:5432/sgpo_unifie
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE

# --- API OpenAI (embeddings + chat) ---
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://api.openai.com/v1
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.vectorstore.pgvector.initialize-schema=true

app.public-url=http://localhost:5173
app.bootstrap-admin=true
